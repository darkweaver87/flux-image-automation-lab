apiVersion: apps/v1
kind: Deployment
metadata:
  name: lobicornis
  namespace: lobicornis
  labels:
    app.kubernetes.io/name: lobicornis
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: lobicornis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lobicornis
    spec:
      automountServiceAccountToken: false
      containers:
        - name: lobicornis
          image: ghcr.io/traefik/lobicornis:v3.4.1
          imagePullPolicy: IfNotPresent
          args:
            - --server
            - --config=/config/lobicornis.yml
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lobicornis
                  key: github-token
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 65534
            runAsGroup: 65534
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - NET_RAW
          volumeMounts:
            - name: config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: lobicornis-config
        - name: tmp
          emptyDir: {}
