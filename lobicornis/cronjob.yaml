apiVersion: batch/v1
kind: CronJob
metadata:
  name: lobicornis-tick
  namespace: lobicornis
  labels:
    app.kubernetes.io/name: lobicornis
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: lobicornis
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          containers:
            - name: tick
              image: docker.io/curlimages/curl:8.10.1
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh"]
              args:
                - -c
                - 'curl -sSf --max-time 60 http://lobicornis.lobicornis.svc.cluster.local:80'
              securityContext:
                allowPrivilegeEscalation: false
                runAsUser: 65534
                runAsGroup: 65534
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop:
                    - NET_RAW
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 32Mi
