apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  labels:
    app.kubernetes.io/name: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traefik
    spec:
      containers:
        - name: traefik
          image: docker.io/library/traefik:v3.6.0 # {"$imagepolicy": "flux-system:traefik"}
          args:
            - --ping=true
          ports:
            - name: traefik
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ping
              port: traefik
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
